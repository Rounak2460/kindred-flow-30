<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 16px; color: #1a1a1a;">
  <h2 style="margin-bottom: 8px;">Your password reset code</h2>
  <p style="font-size: 36px; font-weight: bold; letter-spacing: 8px; background: #f4f4f5; border-radius: 8px; padding: 16px 24px; display: inline-block; margin: 16px 0;">{{ .Token }}</p>
  <p style="color: #71717a;">Enter this code in the app to reset your password. It expires in 10 minutes.</p>
  <p style="color: #a1a1aa; font-size: 13px; margin-top: 32px;">If you didn't request this code, you can safely ignore this email.</p>
</body>
</html>
